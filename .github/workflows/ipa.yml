name: Compile iOS IPA
on:
  push:
    branches: [ main, master ] # Triggers whenever you push code to your template repo

jobs:
  compile:
    runs-on: macos-latest
    steps:
      - name: Fetch Code
        uses: actions/checkout@v4

      - name: Initialize Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Clean upgrades environment to remove deprecation warnings

      - name: Install Project Dependencies
        run: npm install

      - name: Ensure Capacitor iOS Package Exists
        run: npm install @capacitor/ios

      - name: Web Asset Build
        run: npm run build # Safely compiles your template's HTML/JS frontend assets

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Verify Xcode Project Structure
        run: ls -la ios/App/

      - name: Compile Xcode Binaries
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Package Payload to IPA
        run: |
          mkdir -p build/Payload
          # Copies the binary safely from the custom compilation output directory
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app build/Payload/
          cd build && zip -r fps-test-app.ipa Payload/

      - name: Deploy Resulting Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-ipad-app
          path: build/fps-test-app.ipa