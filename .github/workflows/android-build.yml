name: Build Android APK

on:
  push:
    branches: [ main, master ]  # Triggers whenever you push to main or master
  workflow_dispatch:          # Allows you to trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java (Required for Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21' # Fixed: Upgraded from 17 to 21 for modern Capacitor
        cache: 'gradle'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm ci

    - name: Build Web Assets
      # If you just use plain HTML/CSS/JS without a bundler build step (like Vite), 
      # this will safely skip without breaking.
      run: npm run build --if-present

    - name: Sync Web Code to Capacitor Android Shell
      run: |
        npx cap sync android

    - name: Build Android Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
      env:
        NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Finished APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7