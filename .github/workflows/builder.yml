name: Build and Release Mobile Apps

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ==========================================
  # STEP 1: DYNAMIC VERSION TAG GENERATOR
  # ==========================================
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.release_tag }}
      clean_title: ${{ steps.tag.outputs.clean_title }}
      app_name: ${{ steps.tag.outputs.app_name }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Read Metadata from package.json
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name || 'mobile-app'")
          echo "release_tag=v${VERSION}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "clean_title=v${VERSION}" >> $GITHUB_OUTPUT
          echo "app_name=${NAME}" >> $GITHUB_OUTPUT

  # ==========================================
  # STEP 2: PARALLEL ANDROID COMPILATION
  # ==========================================
  build-android:
    needs: create-tag
    name: Build (Android Mobile)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Ensure Capacitor Android Package Exists
        run: npm install @capacitor/android

      - name: Build Web Assets (Bypasses if Vanilla)
        run: npm run build --if-present

      - name: Sync Code to Android Environment
        run: npx cap sync android

      - name: Build Android Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android Staging Binary
        uses: actions/upload-artifact@v4
        with:
          name: android-bin
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # ==========================================
  # STEP 3: PARALLEL IOS COMPILATION (SPM COMPATIBLE)
  # ==========================================
  build-ios:
    needs: create-tag
    name: Build (iOS Mobile)
    runs-on: macos-latest
    steps:
      - name: Fetch Code
        uses: actions/checkout@v4

      - name: Initialize Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Project Dependencies
        run: npm install

      - name: Ensure Capacitor iOS Package Exists
        run: npm install @capacitor/ios

      - name: Web Asset Build (Bypasses if Vanilla)
        run: npm run build --if-present

      - name: Capacitor Sync iOS
        run: npx cap sync ios

      - name: Compile Xcode Binaries via Project SPM
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Package Payload to IPA
        run: |
          mkdir -p build/Payload
          cp -r ios/App/build/Build/Products/Debug-iphoneos/App.app build/Payload/
          cd build && zip -r template-app.ipa Payload/

      - name: Upload iOS Staging Binary
        uses: actions/upload-artifact@v4
        with:
          name: ios-bin
          path: build/template-app.ipa

  # ==========================================
  # STEP 4: UNIFIED GITHUB RELEASE PUBLISHER
  # ==========================================
  publish-release:
    needs: [create-tag, build-android, build-ios]
    name: Publish Shared GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Release Directory
        run: mkdir -p release-assets

      - name: Download Android Asset
        uses: actions/download-artifact@v4
        with:
          name: android-bin
          path: release-assets/

      - name: Download iOS Asset
        uses: actions/download-artifact@v4
        with:
          name: ios-bin
          path: release-assets/

      - name: Standardize and Match Binary Names
        run: |
          APP_NAME="${{ needs.create-tag.outputs.app_name }}"
          mv release-assets/app-debug.apk "release-assets/${APP_NAME}.apk"
          mv release-assets/template-app.ipa "release-assets/${APP_NAME}.ipa"

      - name: Dispatch Upload to Shared Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.release_tag }}
          name: ${{ needs.create-tag.outputs.clean_title }}
          body: |
            Automated Cross-Platform Compilation Pipeline.
            
            Target App: ${{ needs.create-tag.outputs.app_name }}
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
          draft: true
          prerelease: false
          files: |
            release-assets/${{ needs.create-tag.outputs.app_name }}.apk
            release-assets/${{ needs.create-tag.outputs.app_name }}.ipa